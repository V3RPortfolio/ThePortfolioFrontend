<div class="metrics-card">
    @if(isPercentage) {
        <div class="card flex flex-col items-center gap-1">
        
            <p class="text-caption text-muted self-start w-full">{{title}}</p>

            
            <div class="flex flex-col items-center">
                <app-transparent-speedometer [percentage]="value" />
                <div class="flex items-baseline gap-1 -mt-3">
                <span class="metric-value">
                    {{value}}
                </span>
                @if(unit) {
                    <span class="text-caption text-muted">{{unit}}</span>
                }
                </div>
            </div>
        </div>
    } @else {
        <div class="card flex flex-col gap-2">
            <p class="text-caption text-muted">{{title}}</p>

            <div class="flex items-baseline gap-1.5 mt-auto justify-end">
            <span class="metric-value">
                {{value}}
            </span>
            @if(unit) {
                <span class="text-caption text-muted">{{unit}}</span>
            }
            </div>
        </div>
    }
</div>
